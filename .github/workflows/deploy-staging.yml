name: Deploy Staging (POS_Casaletto_staging)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy develop to staging VPS
    runs-on: ubuntu-latest
    environment: POS_Casaletto_staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            set -e
            cd /root/POS_Casaletto_staging

            echo "Sincronizando codigo (develop)..."
            git fetch origin develop
            git reset --hard origin/develop
            git clean -fd

            echo "Instalando dependencias PHP/JS y compilando assets (el Dockerfile solo copia, no compila)..."
            docker run --rm -v "$PWD":/app -w /app php:8.2-cli bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends unzip libicu-dev git curl ca-certificates gnupg > /dev/null
              docker-php-ext-install intl > /dev/null 2>&1
              curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - > /dev/null 2>&1
              apt-get install -y -qq nodejs > /dev/null
              composer install --no-dev --optimize-autoloader
              npm ci
              npm run build
            "

            echo "Reconstruyendo y levantando contenedores..."
            docker compose -f docker-compose.staging.yml up -d --build

            echo "Limpiando imagenes huerfanas..."
            docker image prune -f

            echo "Deploy a staging completado."
